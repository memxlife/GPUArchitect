- claim_id: claim_2ba9ae0d5738
  question: Run a matched cache-friendly control for the latest 2048 KB strided CUDA
    memory probe to test whether the observed bandwidth is due to memory-hierarchy
    locality rather than fixed launch configuration.
  hypothesis: Under the same single-GPU launch configuration and working-set size
    as spec_3626106571cf, reducing the access stride from 128 bytes to 4 bytes will
    produce higher effective bandwidth, falsifying the locality explanation if the
    paired control does not improve over the prior strided result.
  statement: For a 2048 KB working set and 4-byte stride under the specified CUDA
    probe configuration, the measurement yielded an estimated 334.954323 GB/s averaged
    over 3 timed launches.
  status: accepted
  confidence: medium
  support_summary: 'Raw evidence: the bounded `cuda_memory_hierarchy_probe` completed
    successfully with working_set_kb=2048, stride_bytes=4, blocks=80, threads_per_block=128,
    iterations=20000, avg_elapsed_ms=2.445707, checksum=10589503488, and estimated_bandwidth_gb_s=334.954323.
    Interpretation: this provides a cache-friendly control-point measurement under
    matched launch parameters, but by itself it only supports the observed bandwidth
    for this configuration, not a causal locality conclusion.'
  counterevidence:
