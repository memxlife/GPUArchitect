    run alone cannot establish whether bandwidth improved versus the prior measurement.
  - This is a single benchmark run with 3 timed launches under one launch configuration,
    so run-to-run variance and device-state effects are not characterized.
  - Estimated bandwidth is inferred from elapsed time for this probe and does not
    by itself identify which cache or memory level supplied the data.
